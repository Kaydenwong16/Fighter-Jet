<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Kayden's Jet Battle</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: #05070f;
    overflow: hidden;
    height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }
  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    background: linear-gradient(#0a1030, #1a2a55);
    touch-action: none;
  }
  #playerTag {
    position: absolute;
    top: max(12px, env(safe-area-inset-top));
    right: max(24px, env(safe-area-inset-right));
    color: #ffffff;
    text-align: right;
    text-shadow: 0 0 6px #00e5ff, 0 0 2px #000;
    pointer-events: none;
  }
  #playerTag .name { font-size: clamp(18px, 4vw, 26px); font-weight: bold; letter-spacing: 1px; }
  #leaderboard {
    position: absolute;
    top: max(64px, calc(env(safe-area-inset-top) + 54px));
    left: max(20px, env(safe-area-inset-left));
    min-width: 130px;
    color: white;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: clamp(12px, 2.6vw, 15px);
    text-shadow: 0 0 4px #000;
    pointer-events: none;
  }
  #leaderboard .lbTitle { font-weight: bold; color: #ffd54f; margin-bottom: 4px; }
  #leaderboard ol { margin: 0; padding-left: 18px; }
  #leaderboard li { margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  #timer.low { color: #ff5252; animation: timerPulse 0.5s infinite; }
  @keyframes timerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    background: rgba(0,0,0,0.55);
    z-index: 20;
  }
  #overlay h1 { font-size: clamp(28px, 8vw, 42px); margin-bottom: 10px; text-shadow: 0 0 10px #00e5ff; }
  #overlay p { font-size: clamp(14px, 3.5vw, 18px); margin: 6px; max-width: 90vw; line-height: 1.4; }
  #overlay button {
    margin-top: 18px;
    padding: 14px 32px;
    font-size: clamp(18px, 4vw, 20px);
    border: none;
    border-radius: 8px;
    background: #00c853;
    color: white;
    cursor: pointer;
    touch-action: manipulation;
  }
  #overlay button:hover { background: #00e676; }
  #overlay input {
    margin-top: 16px;
    padding: 10px 16px;
    width: min(260px, 80vw);
    font-size: clamp(16px, 4vw, 18px);
    border: none;
    border-radius: 8px;
    text-align: center;
    outline: none;
  }
  #overlay input.shake { animation: shake 0.3s; box-shadow: 0 0 0 3px #ff5252; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  #hud {
    position: absolute;
    top: max(12px, env(safe-area-inset-top));
    left: max(20px, env(safe-area-inset-left));
    color: white;
    font-size: clamp(16px, 3.5vw, 20px);
    text-shadow: 0 0 4px #000;
    pointer-events: none;
  }
  #muteBtn {
    position: absolute;
    top: max(12px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 16px;
    font-size: clamp(14px, 3vw, 16px);
    border: none;
    border-radius: 6px;
    background: rgba(255,255,255,0.15);
    color: white;
    cursor: pointer;
    touch-action: manipulation;
  }
  #muteBtn:hover { background: rgba(255,255,255,0.25); }
  #touchControls {
    display: none;
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #touchControls.active { display: block; }
  #fireBtn {
    position: absolute;
    left: max(24px, env(safe-area-inset-left));
    bottom: max(36px, env(safe-area-inset-bottom));
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 3px solid rgba(255,235,59,0.9);
    background: rgba(255,82,82,0.55);
    color: white;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
    pointer-events: auto;
    touch-action: none;
    box-shadow: 0 0 16px rgba(255,82,82,0.4);
  }
  #fireBtn:active {
    background: rgba(255,82,82,0.85);
    transform: scale(0.95);
  }
  @media (hover: none) and (pointer: coarse) {
    #touchControls.active { display: block; }
    .desktop-hint { display: none; }
    .mobile-hint { display: block; }
  }
  .mobile-hint { display: none; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="playerTag">
  <div class="name" id="playerNameTag">Player</div>
</div>

<div id="hud">
  Score: <span id="score">0</span> &nbsp; Lives: <span id="lives">3</span> &nbsp; Jet: <span id="jetLevel">Falcon</span> &nbsp; Time: <span id="timer">3:00</span>
</div>
<div id="leaderboard">
  <div class="lbTitle">🏆 Top Pilots</div>
  <ol id="lbList"></ol>
</div>
<button id="muteBtn" title="Toggle sound">🔊 Sound</button>

<div id="touchControls">
  <button id="fireBtn">FIRE</button>
</div>

<div id="overlay">
  <h1>Jet Battle</h1>
  <p class="desktop-hint">Arrow Keys / WASD to move &nbsp;&bull;&nbsp; Space to shoot</p>
  <p class="mobile-hint">Drag anywhere to move &nbsp;&bull;&nbsp; Tap FIRE to shoot</p>
  <p id="finalMsg"></p>
  <input id="nameInput" type="text" placeholder="Enter your name" maxlength="14" autocomplete="off">
  <button id="startBtn">Start Game</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player, bullets, enemies, enemyBullets, particles, stars;
let score, lives, gameRunning, spawnTimer, shootCooldown;
let killsSinceBoss, bossActive, bannerText, bannerTimer, playerLevel;
let gameEndTime, currentPlayerName = 'Player';

const KILLS_PER_BOSS = 12;
const MAX_PLAYER_LEVEL = 2;
const GAME_DURATION = 180; // 3 minutes, in seconds

const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches
  || 'ontouchstart' in window;

function resize() {
  const vp = window.visualViewport;
  const w = vp ? vp.width : window.innerWidth;
  const h = vp ? vp.height : window.innerHeight;
  canvas.width = w;
  canvas.height = h;
  if (player && gameRunning) {
    player.x = Math.min(Math.max(player.x, player.w / 2), canvas.width - player.w / 2);
    player.y = Math.min(Math.max(player.y, player.h / 2), canvas.height - player.h / 2);
  }
}
resize();
window.addEventListener('resize', resize);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', resize);
  window.visualViewport.addEventListener('scroll', resize);
}

document.addEventListener('touchmove', e => {
  if (gameRunning) e.preventDefault();
}, { passive: false });

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const finalMsg = document.getElementById('finalMsg');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const timerEl = document.getElementById('timer');
const touchControls = document.getElementById('touchControls');
const fireBtn = document.getElementById('fireBtn');
const nameInput = document.getElementById('nameInput');
const playerNameTag = document.getElementById('playerNameTag');
const lbList = document.getElementById('lbList');

function updateTouchControlsVisibility() {
  touchControls.classList.toggle('active', isTouchDevice && gameRunning);
}

// ---------- Leaderboard (top 3 pilots, shared globally via /api/leaderboard) ----------
const LAST_NAME_KEY = 'jetBattlePlayerName';

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderLeaderboardEntries(top) {
  lbList.innerHTML = top && top.length
    ? top.map(e => `<li>${escapeHtml(e.name)} — ${e.score}</li>`).join('')
    : '<li>No scores yet</li>';
}

async function fetchLeaderboard() {
  try {
    const r = await fetch('/api/leaderboard');
    const data = await r.json();
    renderLeaderboardEntries(data.top);
  } catch (e) {
    // Offline or storage not configured yet — leave whatever was last shown.
  }
}

async function submitScore(name, finalScore) {
  try {
    const r = await fetch('/api/leaderboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, score: finalScore })
    });
    const data = await r.json();
    renderLeaderboardEntries(data.top);
  } catch (e) {
    // If the submit fails, at least try to refresh with whatever's live.
    fetchLeaderboard();
  }
}

try {
  nameInput.value = localStorage.getItem(LAST_NAME_KEY) || '';
} catch (e) {}
fetchLeaderboard();

let keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

const touch = {
  dx: 0,
  dy: 0,
  shoot: false,
  dragId: null,
  lastX: 0,
  lastY: 0
};

canvas.addEventListener('pointerdown', e => {
  if (!gameRunning || !isTouchDevice) return;
  touch.dragId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
  touch.lastX = e.clientX;
  touch.lastY = e.clientY;
});

canvas.addEventListener('pointermove', e => {
  if (touch.dragId !== e.pointerId) return;
  e.preventDefault();
  touch.dx += e.clientX - touch.lastX;
  touch.dy += e.clientY - touch.lastY;
  touch.lastX = e.clientX;
  touch.lastY = e.clientY;
});

function endDrag(e) {
  if (touch.dragId !== e.pointerId) return;
  touch.dragId = null;
}

canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

fireBtn.addEventListener('pointerdown', e => {
  if (!gameRunning) return;
  e.preventDefault();
  touch.shoot = true;
  fireBtn.setPointerCapture(e.pointerId);
});

function endFire(e) {
  touch.shoot = false;
}

fireBtn.addEventListener('pointerup', endFire);
fireBtn.addEventListener('pointercancel', endFire);
fireBtn.addEventListener('pointerleave', endFire);

const Sound = {
  ctx: null,
  master: null,
  musicBus: null,
  noiseBuf: null,
  muted: false,

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.45;
    this.master.connect(this.ctx.destination);
    this.musicBus = this.ctx.createGain();
    this.musicBus.gain.value = 1;
    this.musicBus.connect(this.master);
    const len = this.ctx.sampleRate * 0.5;
    this.noiseBuf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const data = this.noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  },

  resume() {
    this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },

  tone(freq, type, duration, vol, slideTo, destination) {
    if (this.muted) return;
    this.resume();
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t + duration);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(destination || this.master);
    osc.start(t);
    osc.stop(t + duration);
  },

  noise(duration, vol, filterFreq) {
    if (this.muted) return;
    this.resume();
    const t = this.ctx.currentTime;
    const src = this.ctx.createBufferSource();
    src.buffer = this.noiseBuf;
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(filterFreq, t);
    filter.frequency.exponentialRampToValueAtTime(200, t + duration);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(this.master);
    src.start(t);
    src.stop(t + duration);
  },

  shoot() { this.tone(1200, 'square', 0.07, 0.12, 400); },
  explosion() { this.noise(0.25, 0.35, 2000); this.tone(120, 'sawtooth', 0.2, 0.15, 40); },
  playerHit() { this.tone(300, 'sawtooth', 0.3, 0.25, 80); this.noise(0.15, 0.2, 800); },
  scoreUp() { this.tone(660, 'sine', 0.08, 0.1, 990); },
  start() {
    this.tone(440, 'sine', 0.1, 0.15);
    setTimeout(() => this.tone(554, 'sine', 0.1, 0.15), 100);
    setTimeout(() => this.tone(659, 'sine', 0.15, 0.15), 200);
  },
  gameOver() {
    this.tone(440, 'sine', 0.2, 0.2, 220);
    setTimeout(() => this.tone(330, 'sine', 0.25, 0.2, 165), 250);
    setTimeout(() => this.tone(220, 'sine', 0.4, 0.2, 110), 550);
  },
  bossAlert() {
    this.tone(150, 'sawtooth', 0.5, 0.25, 90);
    setTimeout(() => this.tone(150, 'sawtooth', 0.5, 0.25, 90), 300);
  },
  bossHit() { this.tone(200, 'square', 0.06, 0.1, 150); },
  upgrade() {
    this.tone(523.25, 'sine', 0.12, 0.18);
    setTimeout(() => this.tone(659.25, 'sine', 0.12, 0.18), 120);
    setTimeout(() => this.tone(783.99, 'sine', 0.12, 0.18), 240);
    setTimeout(() => this.tone(1046.5, 'sine', 0.25, 0.2), 360);
  },

  musicInterval: null,
  musicStep: 0,
  musicBass: [110, 110, 130.81, 110, 98, 98, 87.31, 98, 110, 110, 146.83, 130.81, 98, 98, 110, 87.31],
  musicLead: [440, 0, 523.25, 0, 587.33, 0, 523.25, 466.16, 440, 0, 587.33, 0, 659.25, 0, 523.25, 0],
  startMusic() {
    if (this.musicInterval) return;
    this.init();
    const begin = () => {
      if (this.musicInterval) return;
      this.musicStep = 0;
      this.musicInterval = setInterval(() => {
        if (!this.muted) {
          const bass = this.musicBass[this.musicStep % this.musicBass.length];
          const lead = this.musicLead[this.musicStep % this.musicLead.length];
          this.tone(bass, 'triangle', 0.24, 0.22, null, this.musicBus);
          if (lead) this.tone(lead, 'sine', 0.18, 0.16, null, this.musicBus);
        }
        this.musicStep++;
      }, 220);
    };
    if (this.ctx.state === 'suspended') {
      this.ctx.resume().then(begin);
    } else {
      begin();
    }
  },
  stopMusic() {
    clearInterval(this.musicInterval);
    this.musicInterval = null;
    this.musicStep = 0;
  }
};

// Extra unlock safety net for mobile browsers (iOS Safari in particular can
// need an additional gesture beyond the Start button before audio flows).
['pointerdown', 'touchend', 'keydown'].forEach(evt => {
  document.addEventListener(evt, () => Sound.resume(), { once: true, passive: true });
});

const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', () => {
  Sound.muted = !Sound.muted;
  muteBtn.textContent = Sound.muted ? '🔇 Muted' : '🔊 Sound';
});

function initGame() {
  const bottomPad = isTouchDevice ? 160 : 100;
  const baseW = isTouchDevice ? 48 : 56;
  const baseH = isTouchDevice ? 62 : 72;
  player = {
    x: canvas.width / 2,
    y: canvas.height - bottomPad,
    baseW, baseH,
    w: baseW,
    h: baseH,
    baseSpeed: isTouchDevice ? 5.5 : 6,
    speed: isTouchDevice ? 5.5 : 6,
    tilt: 0,
    invincible: 0
  };
  bullets = [];
  enemies = [];
  enemyBullets = [];
  particles = [];
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 0.5,
      speed: Math.random() * 2 + 1
    });
  }
  score = 0;
  lives = 3;
  gameRunning = true;
  spawnTimer = 0;
  shootCooldown = 0;
  killsSinceBoss = 0;
  bossActive = false;
  bannerText = '';
  bannerTimer = 0;
  playerLevel = 0;
  gameEndTime = Date.now() + GAME_DURATION * 1000;
  applyPlayerLevel();
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  timerEl.textContent = '3:00';
  timerEl.classList.remove('low');
  updateLevelHud();
}

function drawFighterJet(x, y, w, h, palette, tilt = 0, flip = false) {
  ctx.save();
  ctx.translate(x, y);
  if (flip) ctx.rotate(Math.PI);
  ctx.rotate(tilt);

  const s = w / 56;

  // engine exhaust glow
  const exhaustGrad = ctx.createRadialGradient(0, h * 0.38, 0, 0, h * 0.38, w * 0.22);
  exhaustGrad.addColorStop(0, palette.exhaust);
  exhaustGrad.addColorStop(0.5, palette.exhaustOuter);
  exhaustGrad.addColorStop(1, 'rgba(255,120,0,0)');
  ctx.fillStyle = exhaustGrad;
  ctx.beginPath();
  ctx.ellipse(0, h * 0.42, w * 0.14, h * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();

  // left wing (shadow side)
  ctx.fillStyle = palette.wingDark;
  ctx.beginPath();
  ctx.moveTo(-w * 0.08, h * 0.02);
  ctx.lineTo(-w * 0.52, h * 0.18);
  ctx.lineTo(-w * 0.48, h * 0.28);
  ctx.lineTo(-w * 0.12, h * 0.12);
  ctx.closePath();
  ctx.fill();

  // right wing (lit side)
  ctx.fillStyle = palette.wingLight;
  ctx.beginPath();
  ctx.moveTo(w * 0.08, h * 0.02);
  ctx.lineTo(w * 0.52, h * 0.18);
  ctx.lineTo(w * 0.48, h * 0.28);
  ctx.lineTo(w * 0.12, h * 0.12);
  ctx.closePath();
  ctx.fill();

  // tail fins
  ctx.fillStyle = palette.tail;
  ctx.beginPath();
  ctx.moveTo(-w * 0.1, h * 0.22);
  ctx.lineTo(-w * 0.22, h * 0.38);
  ctx.lineTo(-w * 0.06, h * 0.32);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w * 0.1, h * 0.22);
  ctx.lineTo(w * 0.22, h * 0.38);
  ctx.lineTo(w * 0.06, h * 0.32);
  ctx.closePath();
  ctx.fill();

  // fuselage
  const bodyGrad = ctx.createLinearGradient(-w * 0.2, 0, w * 0.2, 0);
  bodyGrad.addColorStop(0, palette.bodyDark);
  bodyGrad.addColorStop(0.35, palette.body);
  bodyGrad.addColorStop(0.65, palette.bodyLight);
  bodyGrad.addColorStop(1, palette.bodyDark);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.48);
  ctx.bezierCurveTo(w * 0.12, -h * 0.3, w * 0.1, h * 0.15, w * 0.08, h * 0.34);
  ctx.lineTo(-w * 0.08, h * 0.34);
  ctx.bezierCurveTo(-w * 0.1, h * 0.15, -w * 0.12, -h * 0.3, 0, -h * 0.48);
  ctx.closePath();
  ctx.fill();

  // nose cone highlight
  ctx.fillStyle = palette.nose;
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.48);
  ctx.lineTo(w * 0.06, -h * 0.28);
  ctx.lineTo(-w * 0.06, -h * 0.28);
  ctx.closePath();
  ctx.fill();

  // cockpit canopy
  const canopyGrad = ctx.createRadialGradient(0, -h * 0.18, 0, 0, -h * 0.18, w * 0.2);
  canopyGrad.addColorStop(0, palette.canopyHi);
  canopyGrad.addColorStop(0.6, palette.canopy);
  canopyGrad.addColorStop(1, palette.canopyEdge);
  ctx.fillStyle = canopyGrad;
  ctx.beginPath();
  ctx.ellipse(0, -h * 0.16, w * 0.14, h * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // panel lines
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.28);
  ctx.lineTo(0, h * 0.28);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-w * 0.04, h * 0.08);
  ctx.lineTo(w * 0.04, h * 0.08);
  ctx.stroke();

  // engine nozzles
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-w * 0.1, h * 0.3, w * 0.08, h * 0.06);
  ctx.fillRect(w * 0.02, h * 0.3, w * 0.08, h * 0.06);

  ctx.restore();
}

const playerPalettes = [
  {
    name: 'Falcon',
    body: '#5d8aa8', bodyLight: '#8ecae6', bodyDark: '#2c5364',
    wingLight: '#4a7a9b', wingDark: '#1e3a5f', tail: '#3d6a85',
    nose: '#a8d4e6', canopy: '#00b4d8', canopyHi: '#90e0ef', canopyEdge: '#0077b6',
    exhaust: 'rgba(255,200,50,0.9)', exhaustOuter: 'rgba(255,100,0,0.4)'
  },
  {
    name: 'Strike Jet',
    body: '#546e7a', bodyLight: '#eceff1', bodyDark: '#263238',
    wingLight: '#90a4ae', wingDark: '#37474f', tail: '#455a64',
    nose: '#ffffff', canopy: '#00e5ff', canopyHi: '#e0ffff', canopyEdge: '#0091ea',
    exhaust: 'rgba(0,229,255,0.9)', exhaustOuter: 'rgba(0,150,255,0.4)'
  },
  {
    name: 'Phantom Ace',
    body: '#3e2723', bodyLight: '#ffd54f', bodyDark: '#1a1a1a',
    wingLight: '#ffca28', wingDark: '#4e342e', tail: '#6d4c41',
    nose: '#ffe082', canopy: '#ff6d00', canopyHi: '#ffab40', canopyEdge: '#bf360c',
    exhaust: 'rgba(255,109,0,0.95)', exhaustOuter: 'rgba(255,61,0,0.5)'
  }
];

const jetLevelEl = document.getElementById('jetLevel');

function updateLevelHud() {
  jetLevelEl.textContent = playerPalettes[playerLevel].name;
}

function applyPlayerLevel() {
  const growth = 1 + playerLevel * 0.1;
  player.w = player.baseW * growth;
  player.h = player.baseH * growth;
  player.speed = player.baseSpeed * (1 + playerLevel * 0.08);
  player.shootCooldownBase = [10, 8, 6][playerLevel];
}

function drawEnemy(e) {
  const enemyPalette = {
    body: e.color,
    bodyLight: lighten(e.color, 40),
    bodyDark: darken(e.color, 30),
    wingLight: lighten(e.color, 20),
    wingDark: darken(e.color, 40),
    tail: darken(e.color, 20),
    nose: lighten(e.color, 50),
    canopy: '#ff6b6b',
    canopyHi: '#ff9999',
    canopyEdge: '#cc0000',
    exhaust: 'rgba(255,80,40,0.7)',
    exhaustOuter: 'rgba(200,30,0,0.3)'
  };
  drawFighterJet(e.x, e.y, e.w, e.h, enemyPalette, 0, true);
}

const bossPalette = {
  body: '#37474f', bodyLight: '#78909c', bodyDark: '#111a1f',
  wingLight: '#546e7a', wingDark: '#0d1418', tail: '#263238',
  nose: '#b0bec5', canopy: '#ff1744', canopyHi: '#ff8a80', canopyEdge: '#b71c1c',
  exhaust: 'rgba(255,60,0,0.95)', exhaustOuter: 'rgba(180,0,0,0.5)'
};

function drawBoss(e) {
  drawFighterJet(e.x - e.w * 0.28, e.y, e.w * 0.7, e.h * 0.85, bossPalette, 0, true);
  drawFighterJet(e.x + e.w * 0.28, e.y, e.w * 0.7, e.h * 0.85, bossPalette, 0, true);
  drawFighterJet(e.x, e.y - e.h * 0.05, e.w, e.h, bossPalette, 0, true);

  // health bar
  const barW = Math.min(canvas.width * 0.6, 320);
  const barX = canvas.width / 2 - barW / 2;
  const barY = Math.max(56, canvas.height * 0.09);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(barX, barY, barW, 14);
  ctx.fillStyle = '#ff1744';
  ctx.fillRect(barX, barY, barW * Math.max(0, e.hp / e.maxHp), 14);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY, barW, 14);
  ctx.fillStyle = 'white';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('JET DESTROYER', canvas.width / 2, barY - 6);
}

function lighten(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n >> 16) + amount);
  const g = Math.min(255, ((n >> 8) & 0xff) + amount);
  const b = Math.min(255, (n & 0xff) + amount);
  return `rgb(${r},${g},${b})`;
}

function darken(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, (n >> 16) - amount);
  const g = Math.max(0, ((n >> 8) & 0xff) - amount);
  const b = Math.max(0, (n & 0xff) - amount);
  return `rgb(${r},${g},${b})`;
}

function spawnEnemy() {
  const w = 44 + Math.random() * 12;
  enemies.push({
    x: Math.random() * (canvas.width - w) + w / 2,
    y: -50,
    w: w,
    h: w * 1.3,
    speed: 1.5 + Math.random() * 2 + score / 400,
    color: ['#ff5252', '#ff8a65', '#e040fb'][Math.floor(Math.random() * 3)],
    hp: 1
  });
}

function spawnBoss() {
  bossActive = true;
  const w = 46 * 3;
  const h = w * 1.3;
  enemies.push({
    x: canvas.width / 2,
    y: -h,
    w, h,
    speed: 1.4,
    vx: 1.5,
    hp: 24 + Math.floor(score / 100),
    maxHp: 24 + Math.floor(score / 100),
    isBoss: true,
    targetY: canvas.height * 0.22,
    shootTimer: 90
  });
  bannerText = 'BOSS INCOMING!';
  bannerTimer = 90;
  Sound.bossAlert();
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 14; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 30,
      color
    });
  }
}

function update() {
  if (!gameRunning) return;

  // countdown timer
  const remainingSec = Math.max(0, Math.ceil((gameEndTime - Date.now()) / 1000));
  const mm = Math.floor(remainingSec / 60);
  const ss = remainingSec % 60;
  timerEl.textContent = `${mm}:${String(ss).padStart(2, '0')}`;
  timerEl.classList.toggle('low', remainingSec <= 10);
  if (remainingSec <= 0) {
    endGame('time');
    return;
  }

  // player movement (keyboard + finger drag)
  let moveX = 0, moveY = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) moveX += 1;
  if (keys['ArrowUp'] || keys['KeyW']) moveY -= 1;
  if (keys['ArrowDown'] || keys['KeyS']) moveY += 1;
  player.x += moveX * player.speed;
  player.y += moveY * player.speed;

  let dragDX = 0;
  if (isTouchDevice) {
    dragDX = touch.dx;
    player.x += touch.dx;
    player.y += touch.dy;
    touch.dx = 0;
    touch.dy = 0;
  }

  player.x = Math.min(Math.max(player.x, player.w / 2), canvas.width - player.w / 2);
  player.y = Math.min(Math.max(player.y, player.h / 2), canvas.height - player.h / 2);
  const tiltInput = Math.max(-1, Math.min(1, moveX + dragDX / 6));
  const targetTilt = tiltInput * 0.22;
  player.tilt += (targetTilt - player.tilt) * 0.15;

  if (player.invincible > 0) player.invincible--;

  // shooting
  shootCooldown--;
  if ((keys['Space'] || touch.shoot) && shootCooldown <= 0) {
    const y = player.y - player.h / 2;
    if (playerLevel === 0) {
      bullets.push({ x: player.x, y, speed: 10 });
    } else if (playerLevel === 1) {
      bullets.push({ x: player.x - player.w * 0.18, y, speed: 10 });
      bullets.push({ x: player.x + player.w * 0.18, y, speed: 10 });
    } else {
      bullets.push({ x: player.x, y, speed: 10, vx: 0 });
      bullets.push({ x: player.x - player.w * 0.2, y, speed: 10, vx: -1.5 });
      bullets.push({ x: player.x + player.w * 0.2, y, speed: 10, vx: 1.5 });
    }
    shootCooldown = player.shootCooldownBase;
    Sound.shoot();
  }

  // stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  });

  // bullets
  bullets.forEach(b => { b.y -= b.speed; if (b.vx) b.x += b.vx; });
  bullets = bullets.filter(b => b.y > -20 && b.x > -20 && b.x < canvas.width + 20);

  // enemy bullets (boss fire)
  enemyBullets.forEach(b => b.y += b.vy);
  enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 20);

  // spawn fodder enemies (paused while boss is active)
  spawnTimer--;
  if (spawnTimer <= 0 && !bossActive) {
    spawnEnemy();
    spawnTimer = Math.max(20, 55 - Math.floor(score / 50));
  }

  // enemies move
  enemies.forEach(e => {
    if (e.isBoss) {
      if (e.y < e.targetY) {
        e.y += e.speed * 2;
      } else {
        e.x += e.vx * 1.4;
        if (e.x - e.w / 2 < 0 || e.x + e.w / 2 > canvas.width) e.vx *= -1;
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          enemyBullets.push({ x: e.x - e.w * 0.22, y: e.y + e.h * 0.3, vy: 4.5 });
          enemyBullets.push({ x: e.x + e.w * 0.22, y: e.y + e.h * 0.3, vy: 4.5 });
          e.shootTimer = 65;
          Sound.bossHit();
        }
      }
    } else {
      e.y += e.speed;
    }
  });

  // bullet-enemy collisions (hp based, so bosses survive multiple hits)
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      const dx = e.x - b.x, dy = e.y - b.y;
      if (Math.sqrt(dx * dx + dy * dy) < e.w / 2) {
        bullets.splice(j, 1);
        e.hp--;
        if (e.isBoss) {
          spawnParticles(b.x, b.y, '#ff8a80');
          Sound.bossHit();
          if (e.hp <= 0) {
            spawnParticles(e.x, e.y, '#ff1744');
            spawnParticles(e.x - e.w * 0.3, e.y, '#ffab40');
            spawnParticles(e.x + e.w * 0.3, e.y, '#ffab40');
            enemies.splice(i, 1);
            bossActive = false;
            score += 250;
            scoreEl.textContent = score;
            Sound.explosion();
            playerLevel = Math.min(playerLevel + 1, MAX_PLAYER_LEVEL);
            applyPlayerLevel();
            updateLevelHud();
            bannerText = `JET UPGRADED: ${playerPalettes[playerLevel].name}!`;
            bannerTimer = 120;
            Sound.upgrade();
          }
        } else {
          spawnParticles(e.x, e.y, e.color);
          enemies.splice(i, 1);
          score += 10;
          scoreEl.textContent = score;
          Sound.explosion();
          Sound.scoreUp();
          killsSinceBoss++;
          if (killsSinceBoss >= KILLS_PER_BOSS) {
            killsSinceBoss = 0;
            spawnBoss();
          }
        }
        break;
      }
    }
  }

  // enemy bullets hitting player
  if (player.invincible <= 0) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      const dx = b.x - player.x, dy = b.y - player.y;
      if (Math.sqrt(dx * dx + dy * dy) < player.w / 2.6) {
        enemyBullets.splice(i, 1);
        spawnParticles(player.x, player.y, '#00e5ff');
        lives--;
        livesEl.textContent = lives;
        player.invincible = 60;
        Sound.playerHit();
        if (lives <= 0) endGame();
        break;
      }
    }
  }

  // enemy off screen or hits player
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.y - e.h / 2 > canvas.height) {
      enemies.splice(i, 1);
      if (e.isBoss) bossActive = false;
      continue;
    }
    if (player.invincible > 0) continue;
    const dx = e.x - player.x, dy = e.y - player.y;
    if (Math.sqrt(dx * dx + dy * dy) < (e.w + player.w) / 2.6) {
      spawnParticles(player.x, player.y, '#00e5ff');
      lives--;
      livesEl.textContent = lives;
      player.invincible = 60;
      Sound.playerHit();
      if (!e.isBoss) {
        enemies.splice(i, 1);
      }
      if (lives <= 0) {
        endGame();
      }
    }
  }

  // particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  particles = particles.filter(p => p.life > 0);

  if (bannerTimer > 0) bannerTimer--;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // stars
  ctx.fillStyle = 'white';
  stars.forEach(s => {
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // bullets
  ctx.fillStyle = '#ffeb3b';
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // enemy bullets
  ctx.fillStyle = '#ff1744';
  enemyBullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fill();
  });

  // enemies
  enemies.forEach(e => e.isBoss ? drawBoss(e) : drawEnemy(e));

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  });
  ctx.globalAlpha = 1;

  // player (flicker while invincible)
  if (gameRunning) {
    const flicker = player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0;
    ctx.globalAlpha = flicker ? 0.35 : 1;
    drawFighterJet(player.x, player.y, player.w, player.h, playerPalettes[playerLevel], player.tilt);
    ctx.globalAlpha = 1;
  }

  // banner
  if (bannerTimer > 0) {
    ctx.globalAlpha = Math.min(1, bannerTimer / 20);
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.min(38, canvas.width * 0.06)}px Arial`;
    ctx.fillStyle = '#ffeb3b';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 8;
    ctx.fillText(bannerText, canvas.width / 2, canvas.height * 0.32);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function endGame(reason) {
  gameRunning = false;
  finalMsg.textContent = reason === 'time'
    ? `Time's Up! Final Score: ${score}`
    : `Game Over — Final Score: ${score}`;
  startBtn.textContent = 'Play Again';
  overlay.style.display = 'flex';
  updateTouchControlsVisibility();
  Sound.stopMusic();
  Sound.gameOver();
  submitScore(currentPlayerName, score);
}

startBtn.addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.classList.remove('shake');
    void nameInput.offsetWidth;
    nameInput.classList.add('shake');
    nameInput.focus();
    return;
  }
  currentPlayerName = name.slice(0, 14);
  try { localStorage.setItem(LAST_NAME_KEY, currentPlayerName); } catch (e) {}
  playerNameTag.textContent = currentPlayerName;

  Sound.resume();
  overlay.style.display = 'none';
  initGame();
  updateTouchControlsVisibility();
  Sound.start();
  Sound.startMusic();
});

initGame();
gameRunning = false;
overlay.style.display = 'flex';
updateTouchControlsVisibility();
loop();
</script>

</body>
