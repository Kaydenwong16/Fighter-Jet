<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kayden's Jet Battle</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #05070f;
    overflow: hidden;
    height: 100%;
    font-family: Arial, Helvetica, sans-serif;
  }
  #gameCanvas {
    display: block;
    margin: 0 auto;
    background: linear-gradient(#0a1030, #1a2a55);
  }
  #playerTag {
    position: absolute;
    top: 12px;
    right: 24px;
    color: #ffffff;
    text-align: right;
    text-shadow: 0 0 6px #00e5ff, 0 0 2px #000;
    pointer-events: none;
  }
  #playerTag .name {
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  #playerTag .chinese {
    font-size: 20px;
    color: #ffd54f;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    background: rgba(0,0,0,0.55);
  }
  #overlay h1 { font-size: 42px; margin-bottom: 10px; text-shadow: 0 0 10px #00e5ff; }
  #overlay p { font-size: 18px; margin: 6px; }
  #overlay button {
    margin-top: 18px;
    padding: 12px 28px;
    font-size: 20px;
    border: none;
    border-radius: 8px;
    background: #00c853;
    color: white;
    cursor: pointer;
  }
  #overlay button:hover { background: #00e676; }
  #hud {
    position: absolute;
    top: 12px;
    left: 20px;
    color: white;
    font-size: 20px;
    text-shadow: 0 0 4px #000;
  }
  #muteBtn {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    padding: 6px 14px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: rgba(255,255,255,0.15);
    color: white;
    cursor: pointer;
  }
  #muteBtn:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="playerTag">
  <div class="name">Kayden</div>
  <div class="chinese">黄奕海</div>
</div>

<div id="hud">
  Score: <span id="score">0</span> &nbsp; Lives: <span id="lives">3</span>
</div>
<button id="muteBtn" title="Toggle sound">🔊 Sound</button>

<div id="overlay">
  <h1>Jet Battle</h1>
  <p>Arrow Keys / WASD to move &nbsp;&bull;&nbsp; Space to shoot</p>
  <p id="finalMsg"></p>
  <button id="startBtn">Start Game</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const finalMsg = document.getElementById('finalMsg');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');

let keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

const Sound = {
  ctx: null,
  master: null,
  noiseBuf: null,
  muted: false,

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.45;
    this.master.connect(this.ctx.destination);
    const len = this.ctx.sampleRate * 0.5;
    this.noiseBuf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const data = this.noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  },

  resume() {
    this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },

  tone(freq, type, duration, vol, slideTo) {
    if (this.muted) return;
    this.resume();
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t + duration);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(this.master);
    osc.start(t);
    osc.stop(t + duration);
  },

  noise(duration, vol, filterFreq) {
    if (this.muted) return;
    this.resume();
    const t = this.ctx.currentTime;
    const src = this.ctx.createBufferSource();
    src.buffer = this.noiseBuf;
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(filterFreq, t);
    filter.frequency.exponentialRampToValueAtTime(200, t + duration);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(this.master);
    src.start(t);
    src.stop(t + duration);
  },

  shoot() { this.tone(1200, 'square', 0.07, 0.12, 400); },
  explosion() { this.noise(0.25, 0.35, 2000); this.tone(120, 'sawtooth', 0.2, 0.15, 40); },
  playerHit() { this.tone(300, 'sawtooth', 0.3, 0.25, 80); this.noise(0.15, 0.2, 800); },
  scoreUp() { this.tone(660, 'sine', 0.08, 0.1, 990); },
  start() {
    this.tone(440, 'sine', 0.1, 0.15);
    setTimeout(() => this.tone(554, 'sine', 0.1, 0.15), 100);
    setTimeout(() => this.tone(659, 'sine', 0.15, 0.15), 200);
  },
  gameOver() {
    this.tone(440, 'sine', 0.2, 0.2, 220);
    setTimeout(() => this.tone(330, 'sine', 0.25, 0.2, 165), 250);
    setTimeout(() => this.tone(220, 'sine', 0.4, 0.2, 110), 550);
  }
};

const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', () => {
  Sound.muted = !Sound.muted;
  muteBtn.textContent = Sound.muted ? '🔇 Muted' : '🔊 Sound';
});

let player, bullets, enemies, particles, stars;
let score, lives, gameRunning, spawnTimer, shootCooldown;

function initGame() {
  player = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    w: 56,
    h: 72,
    speed: 6,
    tilt: 0
  };
  bullets = [];
  enemies = [];
  particles = [];
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 0.5,
      speed: Math.random() * 2 + 1
    });
  }
  score = 0;
  lives = 3;
  gameRunning = true;
  spawnTimer = 0;
  shootCooldown = 0;
  scoreEl.textContent = score;
  livesEl.textContent = lives;
}

function drawFighterJet(x, y, w, h, palette, tilt = 0, flip = false) {
  ctx.save();
  ctx.translate(x, y);
  if (flip) ctx.rotate(Math.PI);
  ctx.rotate(tilt);

  const s = w / 56;

  // engine exhaust glow
  const exhaustGrad = ctx.createRadialGradient(0, h * 0.38, 0, 0, h * 0.38, w * 0.22);
  exhaustGrad.addColorStop(0, palette.exhaust);
  exhaustGrad.addColorStop(0.5, palette.exhaustOuter);
  exhaustGrad.addColorStop(1, 'rgba(255,120,0,0)');
  ctx.fillStyle = exhaustGrad;
  ctx.beginPath();
  ctx.ellipse(0, h * 0.42, w * 0.14, h * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();

  // left wing (shadow side)
  ctx.fillStyle = palette.wingDark;
  ctx.beginPath();
  ctx.moveTo(-w * 0.08, h * 0.02);
  ctx.lineTo(-w * 0.52, h * 0.18);
  ctx.lineTo(-w * 0.48, h * 0.28);
  ctx.lineTo(-w * 0.12, h * 0.12);
  ctx.closePath();
  ctx.fill();

  // right wing (lit side)
  ctx.fillStyle = palette.wingLight;
  ctx.beginPath();
  ctx.moveTo(w * 0.08, h * 0.02);
  ctx.lineTo(w * 0.52, h * 0.18);
  ctx.lineTo(w * 0.48, h * 0.28);
  ctx.lineTo(w * 0.12, h * 0.12);
  ctx.closePath();
  ctx.fill();

  // tail fins
  ctx.fillStyle = palette.tail;
  ctx.beginPath();
  ctx.moveTo(-w * 0.1, h * 0.22);
  ctx.lineTo(-w * 0.22, h * 0.38);
  ctx.lineTo(-w * 0.06, h * 0.32);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w * 0.1, h * 0.22);
  ctx.lineTo(w * 0.22, h * 0.38);
  ctx.lineTo(w * 0.06, h * 0.32);
  ctx.closePath();
  ctx.fill();

  // fuselage
  const bodyGrad = ctx.createLinearGradient(-w * 0.2, 0, w * 0.2, 0);
  bodyGrad.addColorStop(0, palette.bodyDark);
  bodyGrad.addColorStop(0.35, palette.body);
  bodyGrad.addColorStop(0.65, palette.bodyLight);
  bodyGrad.addColorStop(1, palette.bodyDark);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.48);
  ctx.bezierCurveTo(w * 0.12, -h * 0.3, w * 0.1, h * 0.15, w * 0.08, h * 0.34);
  ctx.lineTo(-w * 0.08, h * 0.34);
  ctx.bezierCurveTo(-w * 0.1, h * 0.15, -w * 0.12, -h * 0.3, 0, -h * 0.48);
  ctx.closePath();
  ctx.fill();

  // nose cone highlight
  ctx.fillStyle = palette.nose;
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.48);
  ctx.lineTo(w * 0.06, -h * 0.28);
  ctx.lineTo(-w * 0.06, -h * 0.28);
  ctx.closePath();
  ctx.fill();

  // cockpit canopy
  const canopyGrad = ctx.createRadialGradient(0, -h * 0.18, 0, 0, -h * 0.18, w * 0.2);
  canopyGrad.addColorStop(0, palette.canopyHi);
  canopyGrad.addColorStop(0.6, palette.canopy);
  canopyGrad.addColorStop(1, palette.canopyEdge);
  ctx.fillStyle = canopyGrad;
  ctx.beginPath();
  ctx.ellipse(0, -h * 0.16, w * 0.14, h * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // panel lines
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.28);
  ctx.lineTo(0, h * 0.28);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-w * 0.04, h * 0.08);
  ctx.lineTo(w * 0.04, h * 0.08);
  ctx.stroke();

  // engine nozzles
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-w * 0.1, h * 0.3, w * 0.08, h * 0.06);
  ctx.fillRect(w * 0.02, h * 0.3, w * 0.08, h * 0.06);

  ctx.restore();
}

const playerPalette = {
  body: '#5d8aa8',
  bodyLight: '#8ecae6',
  bodyDark: '#2c5364',
  wingLight: '#4a7a9b',
  wingDark: '#1e3a5f',
  tail: '#3d6a85',
  nose: '#a8d4e6',
  canopy: '#00b4d8',
  canopyHi: '#90e0ef',
  canopyEdge: '#0077b6',
  exhaust: 'rgba(255,200,50,0.9)',
  exhaustOuter: 'rgba(255,100,0,0.4)'
};

function drawEnemy(e) {
  const enemyPalette = {
    body: e.color,
    bodyLight: lighten(e.color, 40),
    bodyDark: darken(e.color, 30),
    wingLight: lighten(e.color, 20),
    wingDark: darken(e.color, 40),
    tail: darken(e.color, 20),
    nose: lighten(e.color, 50),
    canopy: '#ff6b6b',
    canopyHi: '#ff9999',
    canopyEdge: '#cc0000',
    exhaust: 'rgba(255,80,40,0.7)',
    exhaustOuter: 'rgba(200,30,0,0.3)'
  };
  drawFighterJet(e.x, e.y, e.w, e.h, enemyPalette, 0, true);
}

function lighten(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n >> 16) + amount);
  const g = Math.min(255, ((n >> 8) & 0xff) + amount);
  const b = Math.min(255, (n & 0xff) + amount);
  return `rgb(${r},${g},${b})`;
}

function darken(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, (n >> 16) - amount);
  const g = Math.max(0, ((n >> 8) & 0xff) - amount);
  const b = Math.max(0, (n & 0xff) - amount);
  return `rgb(${r},${g},${b})`;
}

function spawnEnemy() {
  const w = 44 + Math.random() * 12;
  enemies.push({
    x: Math.random() * (canvas.width - w) + w / 2,
    y: -50,
    w: w,
    h: w * 1.3,
    speed: 1.5 + Math.random() * 2 + score / 400,
    color: ['#ff5252', '#ff8a65', '#e040fb'][Math.floor(Math.random() * 3)],
    hp: 1
  });
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 14; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 30,
      color
    });
  }
}

function update() {
  if (!gameRunning) return;

  // player movement
  let targetTilt = 0;
  if ((keys['ArrowLeft'] || keys['KeyA']) && player.x - player.w / 2 > 0) { player.x -= player.speed; targetTilt = -0.22; }
  if ((keys['ArrowRight'] || keys['KeyD']) && player.x + player.w / 2 < canvas.width) { player.x += player.speed; targetTilt = 0.22; }
  if ((keys['ArrowUp'] || keys['KeyW']) && player.y - player.h / 2 > 0) player.y -= player.speed;
  if ((keys['ArrowDown'] || keys['KeyS']) && player.y + player.h / 2 < canvas.height) player.y += player.speed;
  player.tilt += (targetTilt - player.tilt) * 0.15;

  // shooting
  shootCooldown--;
  if (keys['Space'] && shootCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - player.h / 2, speed: 10 });
    shootCooldown = 10;
    Sound.shoot();
  }

  // stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  });

  // bullets
  bullets.forEach(b => b.y -= b.speed);
  bullets = bullets.filter(b => b.y > -20);

  // spawn enemies
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnEnemy();
    spawnTimer = Math.max(20, 55 - Math.floor(score / 50));
  }

  // enemies move
  enemies.forEach(e => e.y += e.speed);

  // bullet-enemy collisions
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      const dx = e.x - b.x, dy = e.y - b.y;
      if (Math.sqrt(dx * dx + dy * dy) < e.w / 2) {
        spawnParticles(e.x, e.y, e.color);
        enemies.splice(i, 1);
        bullets.splice(j, 1);
        score += 10;
        scoreEl.textContent = score;
        Sound.explosion();
        Sound.scoreUp();
        break;
      }
    }
  }

  // enemy off screen or hits player
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.y - e.h / 2 > canvas.height) {
      enemies.splice(i, 1);
      continue;
    }
    const dx = e.x - player.x, dy = e.y - player.y;
    if (Math.sqrt(dx * dx + dy * dy) < (e.w + player.w) / 2.6) {
      spawnParticles(player.x, player.y, '#00e5ff');
      enemies.splice(i, 1);
      lives--;
      livesEl.textContent = lives;
      Sound.playerHit();
      if (lives <= 0) {
        endGame();
      }
    }
  }

  // particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // stars
  ctx.fillStyle = 'white';
  stars.forEach(s => {
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // bullets
  ctx.fillStyle = '#ffeb3b';
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // enemies
  enemies.forEach(drawEnemy);

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  });
  ctx.globalAlpha = 1;

  // player
  if (gameRunning) drawFighterJet(player.x, player.y, player.w, player.h, playerPalette, player.tilt);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function endGame() {
  gameRunning = false;
  finalMsg.textContent = `Game Over — Final Score: ${score}`;
  startBtn.textContent = 'Play Again';
  overlay.style.display = 'flex';
  Sound.gameOver();
}

startBtn.addEventListener('click', () => {
  Sound.resume();
  overlay.style.display = 'none';
  initGame();
  Sound.start();
});

initGame();
gameRunning = false;
overlay.style.display = 'flex';
loop();
</script>

</body>
</html>
